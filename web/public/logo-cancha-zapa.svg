<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Fondo negro -->
  <rect width="400" height="400" rx="40" fill="#09090b"/>
  <!-- Borde naranja -->
  <rect width="400" height="400" rx="40" fill="none" stroke="#f97316" stroke-width="14"/>

  <!-- CZ grande centrado -->
  <text x="200" y="220" font-family="'Barlow Condensed',Arial Narrow,sans-serif" font-weight="900" font-size="200" fill="#ffffff" text-anchor="middle" letter-spacing="-8">CZ</text>

  <!-- Punto naranja -->
  <circle cx="200" cy="300" r="18" fill="#f97316"/>

  <!-- CANCHA.ZAPA pequeño debajo -->
  <text x="200" y="360" font-family="'Barlow Condensed',Arial Narrow,sans-serif" font-weight="700" font-size="36" fill="#52525b" text-anchor="middle" letter-spacing="8">CANCHA.ZAPA</text>
</svg>
