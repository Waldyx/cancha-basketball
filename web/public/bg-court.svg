<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Spotlight radial en el centro — ayuda a que el texto destaque -->
    <radialGradient id="spotlight" cx="50%" cy="45%" r="55%" fx="50%" fy="45%">
      <stop offset="0%"   stop-color="#1c1c1e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="1"/>
    </radialGradient>

    <!-- Fade en los laterales para que las líneas se difuminen -->
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#09090b" stop-opacity="1"/>
      <stop offset="30%"  stop-color="#09090b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#09090b" stop-opacity="1"/>
      <stop offset="30%"  stop-color="#09090b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#09090b" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#09090b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1440" height="800" fill="url(#spotlight)"/>

  <!-- ═══════════════════════════════════════
       MEDIA CANCHA — vista cenital
       Canasta: (720, 72)
       Línea de fondo: y=40
       Paint: x=570–870 · y=40–310
       FT circle: cx=720 cy=310 r=105
       3pt corners: x=185 y x=1255, de y=40 a y=285
       3pt arco: radio=560, sweep=0 (alejándose de canasta)
       Punto más bajo del arco: 72+560=632 ✓
  ════════════════════════════════════════ -->
  <g fill="none" stroke="#f97316" stroke-linecap="round" stroke-linejoin="round">

    <!-- Línea de fondo -->
    <line x1="115" y1="40" x2="1325" y2="40" stroke-width="2.5" opacity="0.20"/>

    <!-- Laterales (sin cerrar abajo) -->
    <line x1="115" y1="40" x2="115" y2="660" stroke-width="2"   opacity="0.12"/>
    <line x1="1325" y1="40" x2="1325" y2="660" stroke-width="2" opacity="0.12"/>

    <!-- Tablero -->
    <line x1="676" y1="47" x2="764" y2="47" stroke-width="4"   opacity="0.28"/>

    <!-- Aro -->
    <circle cx="720" cy="72" r="20" stroke-width="2.5" opacity="0.30"/>

    <!-- Arco restringido -->
    <path d="M 697 40 A 23 23 0 0 0 743 40" stroke-width="2" opacity="0.20"/>

    <!-- Paint / Zona -->
    <rect x="570" y="40" width="300" height="270" stroke-width="2.5" opacity="0.15"/>

    <!-- Hash marks laterales de la zona -->
    <line x1="530" y1="40"  x2="530" y2="62"  stroke-width="1.5" opacity="0.12"/>
    <line x1="910" y1="40"  x2="910" y2="62"  stroke-width="1.5" opacity="0.12"/>
    <line x1="530" y1="125" x2="570" y2="125" stroke-width="1.5" opacity="0.12"/>
    <line x1="870" y1="125" x2="910" y2="125" stroke-width="1.5" opacity="0.12"/>
    <line x1="530" y1="188" x2="570" y2="188" stroke-width="1.5" opacity="0.12"/>
    <line x1="870" y1="188" x2="910" y2="188" stroke-width="1.5" opacity="0.12"/>
    <line x1="530" y1="250" x2="570" y2="250" stroke-width="1.5" opacity="0.12"/>
    <line x1="870" y1="250" x2="910" y2="250" stroke-width="1.5" opacity="0.12"/>

    <!-- Semicírculo de tiro libre (solo la mitad inferior visible) -->
    <circle cx="720" cy="310" r="105" stroke-width="2" opacity="0.13" stroke-dasharray="0 335 330 0"/>

    <!-- Líneas de esquina de la línea de 3 -->
    <line x1="185"  y1="40" x2="185"  y2="285" stroke-width="2.5" opacity="0.17"/>
    <line x1="1255" y1="40" x2="1255" y2="285" stroke-width="2.5" opacity="0.17"/>

    <!-- Arco de 3 puntos
         Centro=(720,72) r=560  extremos=(185,285) y (1255,285)
         sweep=0 → curva hacia el centro de la pista -->
    <path d="M 185 285 A 560 560 0 0 0 1255 285" stroke-width="2.5" opacity="0.17"/>

  </g>

  <!-- Fade lateral izquierdo -->
  <rect width="220" height="800" fill="url(#fadeLeft)"/>
  <!-- Fade lateral derecho -->
  <rect x="1220" width="220" height="800" fill="url(#fadeRight)"/>
  <!-- Fade inferior -->
  <rect y="500" width="1440" height="300" fill="url(#fadeBottom)"/>

</svg>
