<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Asphalt dot texture -->
    <pattern id="asphalt" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="4"  cy="4"  r="1.4" fill="#3f3f46" opacity="0.5"/>
      <circle cx="18" cy="14" r="1.0" fill="#3f3f46" opacity="0.35"/>
      <circle cx="9"  cy="22" r="0.8" fill="#3f3f46" opacity="0.25"/>
      <circle cx="23" cy="24" r="1.2" fill="#3f3f46" opacity="0.3"/>
    </pattern>

    <!-- Diagonal stripe pattern -->
    <pattern id="stripes" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="1.5" height="40" fill="#f97316" opacity="0.04"/>
    </pattern>

    <!-- Glow filter for accents -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Rough displacement -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Asphalt base texture -->
  <rect width="1440" height="800" fill="url(#asphalt)"/>
  <!-- Diagonal stripe overlay -->
  <rect width="1440" height="800" fill="url(#stripes)"/>

  <!-- ═══════════════════════════════════════
       HALF COURT LINES (overhead view)
  ════════════════════════════════════════ -->
  <g fill="none" stroke="#f97316" stroke-linecap="round" stroke-linejoin="round">
    <!-- Court outline -->
    <rect x="80" y="40" width="1280" height="540" stroke-width="4" opacity="0.18"/>
    <!-- Mid-court line -->
    <line x1="80" y1="580" x2="1360" y2="580" stroke-width="3" opacity="0.18"/>
    <!-- Mid-court centre circle -->
    <circle cx="720" cy="580" r="95" stroke-width="3" opacity="0.16"/>
    <!-- Backboard -->
    <line x1="668" y1="52" x2="772" y2="52" stroke-width="5" opacity="0.28"/>
    <!-- Basket / rim -->
    <circle cx="720" cy="78" r="24" stroke-width="3.5" opacity="0.28"/>
    <!-- Restricted area small arc -->
    <path d="M 688 40 A 32 32 0 0 0 752 40" stroke-width="2.5" opacity="0.22"/>
    <!-- Key / Paint -->
    <rect x="615" y="40" width="210" height="240" stroke-width="3" opacity="0.18"/>
    <!-- Free throw lane markers -->
    <line x1="575" y1="40"  x2="575" y2="68"  stroke-width="2" opacity="0.15"/>
    <line x1="865" y1="40"  x2="865" y2="68"  stroke-width="2" opacity="0.15"/>
    <line x1="575" y1="120" x2="615" y2="120" stroke-width="2" opacity="0.15"/>
    <line x1="825" y1="120" x2="865" y2="120" stroke-width="2" opacity="0.15"/>
    <line x1="575" y1="180" x2="615" y2="180" stroke-width="2" opacity="0.15"/>
    <line x1="825" y1="180" x2="865" y2="180" stroke-width="2" opacity="0.15"/>
    <line x1="575" y1="240" x2="615" y2="240" stroke-width="2" opacity="0.15"/>
    <line x1="825" y1="240" x2="865" y2="240" stroke-width="2" opacity="0.15"/>
    <!-- Free throw circle -->
    <circle cx="720" cy="280" r="82" stroke-width="3" opacity="0.18"/>
    <!-- Three-point corner lines -->
    <line x1="162" y1="40" x2="162" y2="290" stroke-width="3" opacity="0.18"/>
    <line x1="1278" y1="40" x2="1278" y2="290" stroke-width="3" opacity="0.18"/>
    <!-- Three-point arc -->
    <path d="M 162 290 A 610 610 0 0 1 1278 290" stroke-width="3" opacity="0.18"/>
  </g>

  <!-- Asphalt crack lines -->
  <g stroke="#27272a" fill="none" stroke-width="1" opacity="0.5" filter="url(#rough)">
    <path d="M 340 40 L 355 95 L 368 98 L 360 160"/>
    <path d="M 950 200 L 960 255 L 948 300"/>
    <path d="M 200 420 L 215 460 L 205 510"/>
    <path d="M 1100 380 L 1090 440 L 1105 480 L 1095 530"/>
    <path d="M 620 500 L 630 540 L 618 570"/>
  </g>

  <!-- ═══════════════════════════════════════
       BASKETBALL — large, bottom-right
  ════════════════════════════════════════ -->
  <g fill="none" stroke="#f97316" stroke-linecap="round">
    <circle cx="1290" cy="710" r="215" stroke-width="5" opacity="0.18"/>
    <line x1="1075" y1="710" x2="1505" y2="710" stroke-width="3.5" opacity="0.15"/>
    <line x1="1290" y1="495" x2="1290" y2="925" stroke-width="3.5" opacity="0.15"/>
    <path d="M 1145 555 C 1180 610 1175 670 1168 725 C 1162 775 1175 825 1198 865"
          stroke-width="3.5" opacity="0.15"/>
    <path d="M 1435 558 C 1400 612 1402 672 1408 728 C 1414 778 1400 828 1378 865"
          stroke-width="3.5" opacity="0.15"/>
  </g>

  <!-- ═══════════════════════════════════════
       BASKETBALL — medium, bottom-left
  ════════════════════════════════════════ -->
  <g fill="none" stroke="#facc15" stroke-linecap="round">
    <circle cx="155" cy="680" r="128" stroke-width="3" opacity="0.14"/>
    <line x1="27" y1="680" x2="283" y2="680" stroke-width="2.5" opacity="0.12"/>
    <line x1="155" y1="552" x2="155" y2="808" stroke-width="2.5" opacity="0.12"/>
    <path d="M 80 618 C 102 652 100 690 96 730 C 93 756 101 782 118 806"
          stroke-width="2.5" opacity="0.12"/>
    <path d="M 228 622 C 206 655 205 694 208 732 C 210 758 203 783 187 806"
          stroke-width="2.5" opacity="0.12"/>
  </g>

  <!-- ═══════════════════════════════════════
       BASKETBALL — small, top-right floating
  ════════════════════════════════════════ -->
  <g fill="none" stroke="#f97316" stroke-linecap="round">
    <circle cx="1340" cy="120" r="72" stroke-width="2.5" opacity="0.14"/>
    <line x1="1268" y1="120" x2="1412" y2="120" stroke-width="2" opacity="0.12"/>
    <line x1="1340" y1="48" x2="1340" y2="192" stroke-width="2" opacity="0.12"/>
    <path d="M 1295 70 C 1310 92 1308 118 1305 144 C 1303 162 1310 178 1320 192"
          stroke-width="2" opacity="0.12"/>
    <path d="M 1385 72 C 1370 94 1369 120 1372 146 C 1374 163 1368 179 1358 192"
          stroke-width="2" opacity="0.12"/>
  </g>

  <!-- ═══════════════════════════════════════
       BASKETBALL — tiny, top-left accent
  ════════════════════════════════════════ -->
  <g fill="none" stroke="#facc15" stroke-linecap="round">
    <circle cx="110" cy="130" r="48" stroke-width="2" opacity="0.11"/>
    <line x1="62" y1="130" x2="158" y2="130" stroke-width="1.5" opacity="0.10"/>
    <line x1="110" y1="82" x2="110" y2="178" stroke-width="1.5" opacity="0.10"/>
    <path d="M 79 100 C 88 112 87 128 85 144 C 84 155 88 165 95 178" stroke-width="1.5" opacity="0.10"/>
    <path d="M 141 102 C 132 113 131 130 133 146 C 134 157 130 167 123 178" stroke-width="1.5" opacity="0.10"/>
  </g>

  <!-- ═══════════════════════════════════════
       MOTION LINES — speed / energy accents
  ════════════════════════════════════════ -->
  <g stroke="#f97316" stroke-linecap="round" fill="none">
    <!-- Left side speed burst -->
    <line x1="30" y1="340" x2="145" y2="340" stroke-width="2.5" opacity="0.12"/>
    <line x1="50" y1="355" x2="120" y2="355" stroke-width="1.5" opacity="0.08"/>
    <line x1="25" y1="370" x2="110" y2="370" stroke-width="1" opacity="0.06"/>
    <!-- Right side speed burst -->
    <line x1="1295" y1="420" x2="1420" y2="420" stroke-width="2.5" opacity="0.10"/>
    <line x1="1320" y1="435" x2="1415" y2="435" stroke-width="1.5" opacity="0.07"/>
    <line x1="1300" y1="450" x2="1400" y2="450" stroke-width="1" opacity="0.05"/>
    <!-- Top center motion arc -->
    <path d="M 560 20 Q 720 -10 880 20" stroke-width="2" opacity="0.10"/>
    <path d="M 600 28 Q 720 5 840 28" stroke-width="1.5" opacity="0.07"/>
  </g>

  <!-- ═══════════════════════════════════════
       GRAFFITI / STREET TEXT ELEMENTS
  ════════════════════════════════════════ -->

  <!-- Giant "24" in background -->
  <text x="540" y="790"
        font-family="Impact, Arial Black, sans-serif"
        font-size="320" font-weight="900"
        fill="#f97316" opacity="0.07"
        style="letter-spacing: -20px">24</text>

  <!-- "GAME" outline, rotated -->
  <text x="720" y="175"
        font-family="Impact, Arial Black, sans-serif"
        font-size="105" font-weight="900"
        fill="none" stroke="#facc15" stroke-width="2"
        opacity="0.10"
        text-anchor="middle"
        transform="rotate(-10, 870, 155)">GAME</text>

  <!-- "HOOPS" bottom left -->
  <text x="88" y="795"
        font-family="Impact, Arial Black, sans-serif"
        font-size="78" font-weight="900"
        fill="none" stroke="#f97316" stroke-width="2"
        opacity="0.11">HOOPS</text>

  <!-- "COURT" top right, vertical -->
  <text x="1410" y="520"
        font-family="Impact, Arial Black, sans-serif"
        font-size="52" font-weight="900"
        fill="none" stroke="#facc15" stroke-width="1.5"
        opacity="0.09"
        transform="rotate(90, 1410, 520)">COURT</text>

  <!-- Spray-paint accent clusters -->
  <g fill="#f97316" opacity="0.07">
    <circle cx="472" cy="42" r="6"/>
    <circle cx="488" cy="55" r="3.5"/>
    <circle cx="458" cy="58" r="2.5"/>
    <circle cx="496" cy="44" r="5"/>
    <circle cx="466" cy="70" r="2"/>
    <circle cx="480" cy="36" r="2.5"/>
  </g>
  <g fill="#facc15" opacity="0.07">
    <circle cx="985"  cy="42" r="5.5"/>
    <circle cx="1000" cy="54" r="3"/>
    <circle cx="970"  cy="50" r="2"/>
    <circle cx="1008" cy="40" r="4"/>
    <circle cx="978"  cy="62" r="2.5"/>
  </g>
  <g fill="#f97316" opacity="0.06">
    <circle cx="1355" cy="45" r="5"/>
    <circle cx="1368" cy="60" r="3"/>
    <circle cx="1342" cy="55" r="2"/>
    <circle cx="1375" cy="46" r="4"/>
  </g>

  <!-- Corner spray cluster top-left -->
  <g fill="#facc15" opacity="0.07">
    <circle cx="68"  cy="42" r="4"/>
    <circle cx="52"  cy="56" r="2.5"/>
    <circle cx="80"  cy="60" r="2"/>
    <circle cx="44"  cy="45" r="3.5"/>
    <circle cx="72"  cy="74" r="2"/>
  </g>

</svg>
