<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Asphalt dot texture -->
    <pattern id="asphalt" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="4"  cy="4"  r="1.4" fill="#3f3f46" opacity="0.5"/>
      <circle cx="18" cy="14" r="1.0" fill="#3f3f46" opacity="0.35"/>
      <circle cx="9"  cy="22" r="0.8" fill="#3f3f46" opacity="0.25"/>
      <circle cx="23" cy="24" r="1.2" fill="#3f3f46" opacity="0.3"/>
    </pattern>

    <!-- Asphalt crack lines (subtle) -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Asphalt base texture -->
  <rect width="1440" height="800" fill="url(#asphalt)"/>

  <!-- ═══════════════════════════════════════
       HALF COURT LINES (overhead view)
       Court: x=80–1360  y=40–580
       Basket: (720, 75)
  ════════════════════════════════════════ -->
  <g fill="none" stroke="#f97316" stroke-linecap="round" stroke-linejoin="round">

    <!-- Court outline -->
    <rect x="80" y="40" width="1280" height="540" stroke-width="4" opacity="0.22"/>

    <!-- Mid-court line -->
    <line x1="80" y1="580" x2="1360" y2="580" stroke-width="3" opacity="0.22"/>

    <!-- Mid-court centre circle -->
    <circle cx="720" cy="580" r="95" stroke-width="3" opacity="0.20"/>

    <!-- Backboard -->
    <line x1="668" y1="52" x2="772" y2="52" stroke-width="5" opacity="0.35"/>

    <!-- Basket / rim -->
    <circle cx="720" cy="78" r="24" stroke-width="3.5" opacity="0.32"/>

    <!-- Restricted area small arc -->
    <path d="M 688 40 A 32 32 0 0 0 752 40" stroke-width="2.5" opacity="0.25"/>

    <!-- Key / Paint -->
    <rect x="615" y="40" width="210" height="240" stroke-width="3" opacity="0.22"/>

    <!-- Free throw lane markers (hash marks) -->
    <line x1="575" y1="40"  x2="575" y2="68"  stroke-width="2" opacity="0.18"/>
    <line x1="865" y1="40"  x2="865" y2="68"  stroke-width="2" opacity="0.18"/>
    <line x1="575" y1="120" x2="615" y2="120" stroke-width="2" opacity="0.18"/>
    <line x1="825" y1="120" x2="865" y2="120" stroke-width="2" opacity="0.18"/>
    <line x1="575" y1="180" x2="615" y2="180" stroke-width="2" opacity="0.18"/>
    <line x1="825" y1="180" x2="865" y2="180" stroke-width="2" opacity="0.18"/>
    <line x1="575" y1="240" x2="615" y2="240" stroke-width="2" opacity="0.18"/>
    <line x1="825" y1="240" x2="865" y2="240" stroke-width="2" opacity="0.18"/>

    <!-- Free throw circle (full) -->
    <circle cx="720" cy="280" r="82" stroke-width="3" opacity="0.22"/>

    <!-- Three-point corner lines -->
    <line x1="162" y1="40" x2="162" y2="290" stroke-width="3" opacity="0.22"/>
    <line x1="1278" y1="40" x2="1278" y2="290" stroke-width="3" opacity="0.22"/>

    <!-- Three-point arc -->
    <path d="M 162 290 A 610 610 0 0 1 1278 290" stroke-width="3" opacity="0.22"/>

  </g>

  <!-- Asphalt crack lines -->
  <g stroke="#27272a" fill="none" stroke-width="1" opacity="0.6" filter="url(#rough)">
    <path d="M 340 40 L 355 95 L 368 98 L 360 160"/>
    <path d="M 950 200 L 960 255 L 948 300"/>
    <path d="M 200 420 L 215 460 L 205 510"/>
    <path d="M 1100 380 L 1090 440 L 1105 480 L 1095 530"/>
    <path d="M 620 500 L 630 540 L 618 570"/>
  </g>

  <!-- ═══════════════════════════════════════
       BASKETBALL — bottom-right corner
  ════════════════════════════════════════ -->
  <g fill="none" stroke="#f97316" stroke-linecap="round">
    <!-- Main circle -->
    <circle cx="1290" cy="710" r="215" stroke-width="5" opacity="0.20"/>
    <!-- Equator line -->
    <line x1="1075" y1="710" x2="1505" y2="710" stroke-width="4" opacity="0.18"/>
    <!-- Vertical centre -->
    <line x1="1290" y1="495" x2="1290" y2="925" stroke-width="4" opacity="0.18"/>
    <!-- Left S-curve seam -->
    <path d="M 1145 555 C 1180 610 1175 670 1168 725 C 1162 775 1175 825 1198 865"
          stroke-width="4" opacity="0.18"/>
    <!-- Right S-curve seam -->
    <path d="M 1435 558 C 1400 612 1402 672 1408 728 C 1414 778 1400 828 1378 865"
          stroke-width="4" opacity="0.18"/>
  </g>

  <!-- ═══════════════════════════════════════
       BASKETBALL — upper-left (smaller)
  ════════════════════════════════════════ -->
  <g fill="none" stroke="#facc15" stroke-linecap="round">
    <circle cx="155" cy="680" r="128" stroke-width="3" opacity="0.16"/>
    <line x1="27" y1="680" x2="283" y2="680" stroke-width="3" opacity="0.14"/>
    <line x1="155" y1="552" x2="155" y2="808" stroke-width="3" opacity="0.14"/>
    <path d="M 80 618 C 102 652 100 690 96 730 C 93 756 101 782 118 806"
          stroke-width="3" opacity="0.14"/>
    <path d="M 228 622 C 206 655 205 694 208 732 C 210 758 203 783 187 806"
          stroke-width="3" opacity="0.14"/>
  </g>

  <!-- ═══════════════════════════════════════
       SHOE SILHOUETTE — stencil style, high-top
       Side view pointing right, bottom at y≈520
  ════════════════════════════════════════ -->
  <g fill="none" stroke="#facc15" stroke-linejoin="round" stroke-linecap="round" opacity="0.24">

    <!-- Midsole / outsole (chunky) -->
    <path d="M 28 522
             C 22 522 18 515 22 506
             L 22 498
             C 24 490 30 486 42 485
             L 398 480
             C 420 479 436 490 438 502
             L 440 514
             C 440 524 434 530 422 530
             L 42 528
             C 32 528 28 526 28 522 Z"
          stroke-width="2.5"/>

    <!-- Main upper body of the shoe -->
    <path d="M 42 486
             L 42 390
             C 42 355 56 325 82 308
             C 105 292 128 288 148 294
             C 165 299 176 314 185 336
             C 200 368 238 385 282 390
             L 398 386
             C 424 384 440 400 440 424
             L 440 479
             L 42 486 Z"
          stroke-width="2.5"/>

    <!-- Ankle collar / cuff (high-top extension) -->
    <path d="M 82 308
             C 72 280 68 252 72 228
             C 76 205 90 192 108 190
             C 126 188 142 198 150 218
             L 165 265
             L 185 336"
          stroke-width="2.5"/>

    <!-- Tongue -->
    <path d="M 148 294 C 162 330 170 365 168 386"
          stroke-width="2" opacity="0.7"/>

    <!-- Lace lines -->
    <line x1="156" y1="302" x2="210" y2="352" stroke-width="2" opacity="0.6"/>
    <line x1="168" y1="310" x2="224" y2="360" stroke-width="2" opacity="0.6"/>
    <line x1="182" y1="320" x2="240" y2="368" stroke-width="2" opacity="0.6"/>
    <line x1="198" y1="331" x2="258" y2="376" stroke-width="2" opacity="0.6"/>

    <!-- Ankle collar detail stitching -->
    <path d="M 74 228 C 82 220 96 216 112 218"
          stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Spray-paint splatter dots around shoe -->
  <g fill="#facc15">
    <circle cx="10"  cy="505" r="4"   opacity="0.10"/>
    <circle cx="6"   cy="492" r="2.5" opacity="0.07"/>
    <circle cx="458" cy="498" r="3.5" opacity="0.09"/>
    <circle cx="470" cy="486" r="2"   opacity="0.07"/>
    <circle cx="465" cy="510" r="2.5" opacity="0.07"/>
    <circle cx="90"  cy="170" r="3"   opacity="0.09"/>
    <circle cx="78"  cy="162" r="2"   opacity="0.07"/>
    <circle cx="102" cy="158" r="1.5" opacity="0.06"/>
    <circle cx="68"  cy="188" r="2"   opacity="0.07"/>
  </g>

  <!-- ═══════════════════════════════════════
       GRAFFITI / STREET TEXT ELEMENTS
  ════════════════════════════════════════ -->

  <!-- Giant "24" in background -->
  <text x="540" y="790"
        font-family="Impact, Arial Black, sans-serif"
        font-size="320" font-weight="900"
        fill="#f97316" opacity="0.09"
        style="letter-spacing: -20px">24</text>

  <!-- "GAME" outline, rotated -->
  <text x="720" y="175"
        font-family="Impact, Arial Black, sans-serif"
        font-size="105" font-weight="900"
        fill="none" stroke="#facc15" stroke-width="2"
        opacity="0.12"
        text-anchor="middle"
        transform="rotate(-10, 870, 155)">GAME</text>

  <!-- "HOOPS" bottom left -->
  <text x="88" y="795"
        font-family="Impact, Arial Black, sans-serif"
        font-size="78" font-weight="900"
        fill="none" stroke="#f97316" stroke-width="2"
        opacity="0.13">HOOPS</text>

  <!-- Spray-paint accent clusters -->
  <g fill="#f97316" opacity="0.07">
    <circle cx="472" cy="42" r="6"/>
    <circle cx="488" cy="55" r="3.5"/>
    <circle cx="458" cy="58" r="2.5"/>
    <circle cx="496" cy="44" r="5"/>
    <circle cx="466" cy="70" r="2"/>
    <circle cx="480" cy="36" r="2.5"/>
  </g>
  <g fill="#facc15" opacity="0.07">
    <circle cx="985"  cy="42" r="5.5"/>
    <circle cx="1000" cy="54" r="3"/>
    <circle cx="970"  cy="50" r="2"/>
    <circle cx="1008" cy="40" r="4"/>
    <circle cx="978"  cy="62" r="2.5"/>
  </g>

  <!-- Corner spray cluster bottom-right -->
  <g fill="#f97316" opacity="0.06">
    <circle cx="1355" cy="45" r="5"/>
    <circle cx="1368" cy="60" r="3"/>
    <circle cx="1342" cy="55" r="2"/>
    <circle cx="1375" cy="46" r="4"/>
  </g>

</svg>
