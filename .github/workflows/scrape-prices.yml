name: 🔍 Actualizar precios

on:
  schedule:
    # Cada día a las 4:00 AM UTC (6:00 AM Madrid)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      tienda:
        description: "Scrape solo esta tienda (ej: amazon_es). Vacío = todas."
        required: false
      zapa_id:
        description: "Scrape solo esta zapatilla (ej: nike-lebron-22). Vacío = todas."
        required: false

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape precios
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: web
        run: npm ci

      # CloakBrowser usa su propio Chromium stealth (no el de Playwright), pero
      # necesita las librerías de sistema de Ubuntu que Chromium requiere.
      - name: 🎭 Instalar librerías de sistema (Chromium deps)
        working-directory: web
        run: npx playwright install-deps chromium

      # Pre-descargar el binario stealth de CloakBrowser (~200MB) para que el
      # scraper no pierda tiempo descargándolo en el primer request.
      - name: 🥷 Descargar binario CloakBrowser
        working-directory: web
        run: node -e "import('cloakbrowser').then(m => m.ensureBinary()).then(i => console.log('CloakBrowser listo:', i?.binaryPath ?? 'ok')).catch(e => { console.error(e); process.exit(1); })"

      - name: 🔍 Ejecutar scraper
        working-directory: web
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.tienda }}" ]; then
            ARGS="--tienda ${{ github.event.inputs.tienda }}"
          fi
          if [ -n "${{ github.event.inputs.zapa_id }}" ]; then
            ARGS="$ARGS --id ${{ github.event.inputs.zapa_id }}"
          fi
          npx tsx scripts/scraper/index.ts $ARGS --idealo
        env:
          NODE_ENV: production

      - name: 💾 Commit precios.json actualizado
        working-directory: web
        run: |
          git config user.name "price-bot[bot]"
          git config user.email "price-bot@users.noreply.github.com"
          git add src/data/precios.json
          if git diff --staged --quiet; then
            echo "Sin cambios en precios.json — nada que commitear."
          else
            git commit -m "chore(precios): actualizar precios $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
            echo "PRICES_UPDATED=true" >> $GITHUB_ENV
          fi

      # Deploy: el git push del paso anterior ya activa el deploy automático
      # de Vercel vía integración GitHub → no hace falta llamar a la CLI.
