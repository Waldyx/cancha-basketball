# TEMPORAL — sonda de endpoints de baloncestoenvivo.feb.es para calibrar el
# importador de actas de /estadisticas. Solo corre en la rama de trabajo;
# borrar (junto a probe-out/) cuando el importador esté hecho. NO fusionar a master.
name: FEB probe
on:
  push:
    branches: ["claude/basketball-analytics-app-mwwaq5"]
    paths: [".github/workflows/feb-probe.yml"]
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe FEB pages and API endpoints
        run: |
          mkdir -p probe-out
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          for id in 2491568 2417267; do
            curl -sL -A "$UA" -o "probe-out/partido-$id.html" "https://baloncestoenvivo.feb.es/partido/$id"
            TOKEN=$(grep -oE 'id="_ctl0_token" value="[^"]+"' "probe-out/partido-$id.html" | sed 's/.*value="//;s/"$//')
            echo "token partido $id: ${#TOKEN} chars" >> probe-out/_status.txt
            for ep in "BoxScore/$id" "TeamStats/$id"; do
              fn=$(echo "v1-$ep" | tr '/' '-')
              code=$(curl -sL -A "$UA" -H "Accept: application/json" -H "Authorization: Bearer $TOKEN" -o "probe-out/$fn.json" -w "%{http_code}" "https://intrafeb.feb.es/LiveStats.API/api/v1/$ep" || echo ERR)
              echo "$code  api/v1/$ep" >> probe-out/_status.txt
            done
            rm -f "probe-out/partido-$id.html"
          done
          echo "== STATUS =="; cat probe-out/_status.txt
      - name: Commit results to work branch
        run: |
          git config user.name "feb-probe-bot"
          git config user.email "actions@github.com"
          git add -f probe-out
          git commit -m "chore(probe): resultados sonda FEB [skip-vercel]" || echo "nada que commitear"
          git push origin HEAD:claude/basketball-analytics-app-mwwaq5
