# TEMPORAL — sonda de endpoints de baloncestoenvivo.feb.es para calibrar el
# importador de actas de /estadisticas. Solo corre en la rama de trabajo;
# borrar cuando el importador esté hecho. NO fusionar a master.
name: FEB probe
on:
  push:
    branches: ["claude/basketball-analytics-app-mwwaq5"]
    paths: [".github/workflows/feb-probe.yml"]
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe FEB pages and API endpoints
        run: |
          mkdir -p out
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          for id in 2491568 2417267 2413341 2220119; do
            for ep in "partido/$id" "api/ShotChart/$id" "api/BoxScore/$id" "api/PlayByPlay/$id" "api/Game/$id" "api/GameStats/$id"; do
              fn=$(echo "$ep" | tr '/' '-')
              code=$(curl -sL -A "$UA" -o "out/$fn" -w "%{http_code}" "https://baloncestoenvivo.feb.es/$ep" || echo ERR)
              echo "$code  $ep" >> out/_status.txt
            done
          done
          # JS que carga la página del partido (ahí están los endpoints reales)
          grep -ohE 'src="[^"]+\.js[^"]*"' out/partido-* 2>/dev/null | sed 's/src="//;s/"$//' | sort -u | head -25 > out/_js-urls.txt || true
          i=0
          while read -r u; do
            [ -z "$u" ] && continue
            case "$u" in
              http*) full="$u";;
              /*) full="https://baloncestoenvivo.feb.es$u";;
              *) full="https://baloncestoenvivo.feb.es/$u";;
            esac
            i=$((i+1))
            curl -sL -A "$UA" -o "out/js-$i.js" "$full" || true
            echo "js-$i.js <- $full" >> out/_js-map.txt
          done < out/_js-urls.txt
          # todas las rutas api/ mencionadas en HTML+JS
          grep -ohriE '[a-z]*api/[A-Za-z0-9/_.-]+' out/ 2>/dev/null | sort -u > out/_api-endpoints.txt || true
          echo "== STATUS =="; cat out/_status.txt
          echo "== API REFS =="; cat out/_api-endpoints.txt || true
          ls -la out
      - uses: actions/upload-artifact@v4
        with:
          name: feb-probe
          path: out
          retention-days: 3
