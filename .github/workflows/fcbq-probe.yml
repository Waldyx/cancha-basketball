# TEMPORAL — baja capturas PÚBLICAS de la app "Bàsquet Català" de las tiendas
# (Google Play / App Store) para leer las cabeceras reales de la tabla de stats y
# calibrar el parser de /estadisticas. Solo imágenes públicas de marketing; no toca
# ningún backend. Solo esta rama; borrar tras el análisis. NO fusionar a master.
name: FCBQ probe
on:
  push:
    branches: ["claude/basketball-analytics-app-mwwaq5"]
    paths: [".github/workflows/fcbq-probe.yml"]
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download public app-store screenshots
        run: |
          mkdir -p fcbq-out
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"

          # Fichas públicas de la app en las tiendas
          curl -sL -A "$UA" "https://play.google.com/store/apps/details?id=cat.basquetcatala.appbasket&hl=ca" -o fcbq-out/play.html
          curl -sL -A "$UA" "https://apps.apple.com/es/app/b%C3%A0squet-catal%C3%A0/id923504242?l=ca" -o fcbq-out/apple.html

          # URLs de capturas (Google usa play-lh.googleusercontent.com; Apple usa mzstatic.com)
          grep -ohE 'https://play-lh\.googleusercontent\.com/[A-Za-z0-9_./=-]+' fcbq-out/play.html | sort -u | head -20 > fcbq-out/_imgs.txt || true
          grep -ohE 'https://[a-z0-9.-]*mzstatic\.com/[A-Za-z0-9_./=-]+\.(png|jpg|jpeg)' fcbq-out/apple.html | sort -u | head -20 >> fcbq-out/_imgs.txt || true

          i=0
          while read -r u; do
            [ -z "$u" ] && continue
            i=$((i+1))
            ext=png; case "$u" in *.jpg*|*.jpeg*) ext=jpg;; esac
            curl -sL -A "$UA" "$u" -o "fcbq-out/shot-$i.$ext" || true
            sz=$(stat -c%s "fcbq-out/shot-$i.$ext" 2>/dev/null || echo 0)
            echo "$sz  shot-$i.$ext  <- $u" >> fcbq-out/_status.txt
          done < fcbq-out/_imgs.txt

          # descartar imágenes diminutas (iconos) y quedarnos con capturas grandes
          for f in fcbq-out/shot-*; do
            sz=$(stat -c%s "$f" 2>/dev/null || echo 0)
            [ "$sz" -lt 15000 ] && rm -f "$f"
          done
          rm -f fcbq-out/play.html fcbq-out/apple.html
          echo "== STATUS =="; cat fcbq-out/_status.txt; echo "== QUEDAN =="; ls -la fcbq-out/
      - name: Commit results to work branch
        run: |
          git config user.name "fcbq-probe-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin claude/basketball-analytics-app-mwwaq5 || true
          git add -f fcbq-out
          git commit -m "chore(probe): capturas app FCBQ [skip-vercel]" || echo "nada que commitear"
          git push origin HEAD:claude/basketball-analytics-app-mwwaq5
