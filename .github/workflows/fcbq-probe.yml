# TEMPORAL — busca un box score catalán REAL en webs de terceros (no la federación,
# sin reCAPTCHA) para calibrar el parser de /estadisticas. Solo esta rama; borrar
# tras el análisis. NO fusionar a master.
name: FCBQ probe
on:
  push:
    branches: ["claude/basketball-analytics-app-mwwaq5"]
    paths: [".github/workflows/fcbq-probe.yml"]
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hunt third-party Catalan box scores
        run: |
          mkdir -p fcbq-out
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"

          fetch() { curl -sL -A "$UA" --max-time 25 -o "fcbq-out/$2" -w "%{http_code}  $1 -> $2\n" "$1" >> fcbq-out/_status.txt || echo "ERR $1" >> fcbq-out/_status.txt; }

          # Sitios de terceros de estadística catalana
          fetch "https://www.basquet.top/" bt-home.html
          fetch "https://esmaixada.cat/es/produccio-basquet/" esm.html

          # Extraer enlaces a partidos/estadísticas de basquet.top
          grep -ohE 'href="[^"]*(partit|estadist|match|jornada|resultat)[^"]*"' fcbq-out/bt-home.html 2>/dev/null | sed 's/href="//;s/"$//' | sort -u | head -20 > fcbq-out/_bt-links.txt || true
          i=0
          while read -r u; do
            [ -z "$u" ] && continue
            case "$u" in http*) full="$u";; /*) full="https://www.basquet.top$u";; *) full="https://www.basquet.top/$u";; esac
            i=$((i+1)); [ "$i" -gt 4 ] && break
            fetch "$full" "bt-$i.html"
          done < fcbq-out/_bt-links.txt

          # De cada HTML, extraer cabeceras de tabla y filas (posible box score)
          for f in fcbq-out/*.html; do
            echo "════════ $f ════════" >> fcbq-out/_tables.txt
            # cabeceras <th> y celdas de las primeras filas
            grep -ohiE '<th[^>]*>[^<]{1,20}</th>' "$f" 2>/dev/null | sed -E 's/<[^>]+>//g' | tr '\n' '|' | head -c 2000 >> fcbq-out/_tables.txt
            echo "" >> fcbq-out/_tables.txt
            # buscar palabras clave de stats
            grep -oiE 'punts|rebots|assist|valorac|t2|t3|t1|tir lliure|recuperac|taps|faltes|minuts' "$f" 2>/dev/null | sort | uniq -c | sort -rn | head -15 >> fcbq-out/_tables.txt
          done

          # recortar HTML grandes
          for f in fcbq-out/*.html; do head -c 40000 "$f" > "$f.t" && mv "$f.t" "$f"; done
          echo "== STATUS =="; cat fcbq-out/_status.txt
          echo "== TABLES =="; head -c 3000 fcbq-out/_tables.txt
      - name: Commit results to work branch
        run: |
          git config user.name "fcbq-probe-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin claude/basketball-analytics-app-mwwaq5 || true
          rm -f fcbq-out/shot-*.png fcbq-out/shot-*.jpg fcbq-out/_imgs.txt
          git add -f fcbq-out
          git commit -m "chore(probe): box scores terceros [skip-vercel]" || echo "nada que commitear"
          git push origin HEAD:claude/basketball-analytics-app-mwwaq5
