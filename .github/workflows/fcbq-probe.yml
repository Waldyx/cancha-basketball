# TEMPORAL — sonda de basquetcatala.cat (FCBQ) para evaluar un importador de actas
# catalán. Solo corre en la rama de trabajo; borrar tras el análisis. NO fusionar a master.
name: FCBQ probe
on:
  push:
    branches: ["claude/basketball-analytics-app-mwwaq5"]
    paths: [".github/workflows/fcbq-probe.yml"]
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe FCBQ site structure
        run: |
          mkdir -p fcbq-out
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          get() { curl -sL -A "$UA" -o "fcbq-out/$2" -w "%{http_code}  $1\n" "$1" >> fcbq-out/_status.txt || true; }

          get "https://www.basquetcatala.cat/" home.html
          get "https://www.basquetcatala.cat/resultats" resultats.html

          # enlaces a partits/actas/competicions en la home y resultats
          grep -ohE 'href="[^"]*(partit|acta|resultats|competicio|classificacio)[^"]*"' fcbq-out/*.html 2>/dev/null | sort -u | head -60 > fcbq-out/_links.txt || true

          # coger hasta 3 enlaces de partit/acta y bajarlos
          i=0
          grep -oE '"[^"]*(partit|acta)[^"]*"' fcbq-out/_links.txt | tr -d '"' | sort -u | head -3 | while read -r u; do
            case "$u" in http*) full="$u";; /*) full="https://www.basquetcatala.cat$u";; *) full="https://www.basquetcatala.cat/$u";; esac
            i=$((i+1))
            get "$full" "partit-$i.html"
          done

          # referencias a APIs/JSON en HTML y sus JS
          grep -ohE 'src="[^"]+\.js[^"]*"' fcbq-out/*.html 2>/dev/null | sed 's/src="//;s/"$//' | sort -u | head -15 > fcbq-out/_js-urls.txt || true
          j=0
          while read -r u; do
            [ -z "$u" ] && continue
            case "$u" in http*) full="$u";; /*) full="https://www.basquetcatala.cat$u";; *) full="https://www.basquetcatala.cat/$u";; esac
            j=$((j+1))
            curl -sL -A "$UA" -o "fcbq-out/js-$j.js" "$full" || true
          done < fcbq-out/_js-urls.txt
          grep -ohriE 'https?://[a-z0-9.-]*api[a-z0-9.-]*[^"'"'"' )]*|[a-z]*api/[A-Za-z0-9/_.-]+|\.json[^a-z]' fcbq-out/ 2>/dev/null | sort -u | head -60 > fcbq-out/_api-refs.txt || true

          # recortar HTML grandes (solo necesitamos estructura, no todo)
          for f in fcbq-out/*.html; do head -c 60000 "$f" > "$f.trim" && mv "$f.trim" "$f"; done
          for f in fcbq-out/js-*.js; do [ -f "$f" ] && head -c 80000 "$f" > "$f.trim" && mv "$f.trim" "$f"; done
          cat fcbq-out/_status.txt
      - name: Commit results to work branch
        run: |
          git config user.name "fcbq-probe-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin claude/basketball-analytics-app-mwwaq5 || true
          git add -f fcbq-out
          git commit -m "chore(probe): resultados sonda FCBQ" || echo "nada que commitear"
          git push origin HEAD:claude/basketball-analytics-app-mwwaq5
