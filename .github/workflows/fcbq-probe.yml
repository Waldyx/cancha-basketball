# TEMPORAL — abre con Chromium la página pública que pidió el usuario y guarda
# captura + texto. Solo esta rama; borrar tras verla. NO fusionar a master.
name: FCBQ probe
on:
  push:
    branches: ["claude/basketball-analytics-app-mwwaq5"]
    paths: [".github/workflows/fcbq-probe.yml"]
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Render page with a real browser
        run: |
          mkdir -p fcbq-out
          npm i playwright@1.47.2 >/dev/null 2>&1
          npx playwright install chromium >/dev/null 2>&1
          cat > run.mjs <<'JS'
          import { chromium } from "playwright";
          const b = await chromium.launch();
          const p = await b.newPage({ viewport: { width: 1280, height: 2200 }, locale: "ca-ES" });
          const url = "https://www.basquetcatala.cat/pagina/8828";
          const r = await p.goto(url, { waitUntil: "networkidle", timeout: 45000 }).catch(e => ({ status: () => "ERR " + e.message }));
          const fs = await import("node:fs");
          fs.writeFileSync("fcbq-out/_status.txt", "status: " + (r && r.status ? r.status() : "?") + "\ntitle: " + await p.title() + "\n");
          fs.writeFileSync("fcbq-out/page.txt", (await p.innerText("body").catch(()=> "")).slice(0, 8000));
          await p.screenshot({ path: "fcbq-out/page.png", fullPage: true });
          await b.close();
          JS
          node run.mjs || true
          echo "== STATUS =="; cat fcbq-out/_status.txt; echo "== TEXT (head) =="; head -c 1500 fcbq-out/page.txt
      - name: Commit results to work branch
        run: |
          git config user.name "fcbq-probe-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin claude/basketball-analytics-app-mwwaq5 || true
          git add -f fcbq-out
          git commit -m "chore(probe): render pagina 8828 [skip-vercel]" || echo "nada"
          git push origin HEAD:claude/basketball-analytics-app-mwwaq5
