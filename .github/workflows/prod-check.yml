# TEMPORAL — verificación en producción del importador FEB (/estadisticas + /api/feb).
# Solo corre en la rama de trabajo; borrar tras la revisión. NO fusionar a master.
name: Prod check
on:
  push:
    branches: ["claude/basketball-analytics-app-mwwaq5"]
    paths: [".github/workflows/prod-check.yml"]
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check production
        run: |
          mkdir -p check-out
          log() { echo "$1" >> check-out/_resultado.txt; }

          # 1. La página /estadisticas está desplegada y lleva el bloque de importación
          code=$(curl -sL -o check-out/estadisticas.html -w "%{http_code}" "https://canchazapa.com/estadisticas")
          log "GET /estadisticas -> $code"
          grep -q 'id="feb-q"' check-out/estadisticas.html && log "bloque importador FEB: PRESENTE" || log "bloque importador FEB: AUSENTE"
          rm -f check-out/estadisticas.html

          # 2. El service worker desplegado tiene el bypass de /api/
          curl -sL -o check-out/sw.js "https://canchazapa.com/sw.js"
          grep -q 'pathname.startsWith("/api/")' check-out/sw.js && log "sw.js bypass /api/: OK" || log "sw.js bypass /api/: FALTA"
          rm -f check-out/sw.js

          # 3. Llamada REAL al importador contra la FEB (partido Liga U conocido)
          code=$(curl -sL -o check-out/api-feb-ok.json -w "%{http_code}" "https://canchazapa.com/api/feb?partido=2491568")
          log "GET /api/feb?partido=2491568 -> $code ($(wc -c < check-out/api-feb-ok.json) bytes)"

          # 4. Caso de error controlado
          code=$(curl -sL -o check-out/api-feb-err.json -w "%{http_code}" "https://canchazapa.com/api/feb?partido=abc")
          log "GET /api/feb?partido=abc -> $code"

          cat check-out/_resultado.txt
      - name: Commit results to work branch
        run: |
          git config user.name "prod-check-bot"
          git config user.email "actions@github.com"
          git add -f check-out
          git commit -m "chore(check): resultados verificación producción" || echo "nada que commitear"
          git push origin HEAD:claude/basketball-analytics-app-mwwaq5
